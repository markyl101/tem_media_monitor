# tem media monitor configuration

scoring:
  model: claude-haiku-4-5-20251001
  # Thresholds for routing
  instant_alert_min: 8    # Score 8-10 → instant Slack alert
  digest_min: 4           # Score 4-7  → daily digest queue
  # Below digest_min → store to log only

slack:
  instant_channel: "#inter-alerts"
  digest_channel: "#service-content-and-credibility"

