name: Hourly Scan

on:
  schedule:
    - cron: "0 * * * *"  # Every hour on the hour
  workflow_dispatch: {}   # Manual trigger for testing

permissions:
  contents: write  # Needed to commit seen_urls.json back

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run hourly scan
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          APIFY_API_TOKEN: ${{ secrets.APIFY_API_TOKEN }}
        run: python -m src.main scan

      - name: Commit updated state files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/seen_urls.json data/digest_queue.json data/weekly_log.json
          git diff --staged --quiet || git commit -m "chore: update scan state [skip ci]"
          git push
