name: Daily Digest

on:
  schedule:
    - cron: "0 9 * * 1-5"   # 9am GMT weekdays
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  digest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Send daily digest to Slack
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
        run: python -m src.main digest

      - name: Commit cleared digest queue
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/digest_queue.json
          git diff --staged --quiet || git commit -m "chore: clear digest queue [skip ci]"
          git push
